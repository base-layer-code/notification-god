<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOD NOTICE</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <style>
    body { background: #0d1117; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 12px; width: 100%; max-width: 350px; text-align: center; }
    button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: #58a6ff; color: white; }
    .user-item { background: #21262d; padding: 10px; margin: 5px 0; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
    .push-btn { width: auto; padding: 5px 15px; background: #238636; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="card">
  <h2>TARGET PUSH</h2>
  
  <div id="login-section">
    <button id="login-btn">Googleでログイン</button>
    <p style="font-size: 12px; color: #8b949e;">※反応しない場合はSafariで開き直してください</p>
  </div>

  <div id="main-section" class="hidden">
    <p id="user-display" style="color: #8b949e;"></p>
    <h3>送信先リスト</h3>
    <div id="user-list">読込中...</div>
  </div>
</div>

<script>
  // ★自分のFirebase設定に貼り替えてください！
  const firebaseConfig = {
    apiKey: "AIzaSyAfjTWeL71syzo7SNpym7ATcbrq6i7JfXQ",
    authDomain: "game-server-df061.firebaseapp.com",
    databaseURL: "https://game-server-df061-default-rtdb.firebaseio.com",
    projectId: "game-server-df061",
    storageBucket: "game-server-df061.firebasestorage.app",
    messagingSenderId: "475396427934",
    appId: "1:475396427934:web:5106a6210aa51e3b8f6b8f"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const auth = firebase.auth();

  // ログインボタンの処理
  document.getElementById('login-btn').onclick = () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    // iPhoneで最も確実なRedirect方式
    auth.signInWithRedirect(provider);
  };

  // ログイン状態の監視
  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById('login-section').classList.add('hidden');
      document.getElementById('main-section').classList.remove('hidden');
      document.getElementById('user-display').innerText = "Login: " + user.displayName;
      setupApp(user);
    }
  });

  function setupApp(user) {
    const safeEmail = user.email.replace(/\./g, ',');
    
    // 自分の情報を登録
    db.ref('users/' + safeEmail).set({
      name: user.displayName,
      email: user.email
    });

    // 通知の許可（画面をどこか触った時に発動）
    document.body.addEventListener('click', () => {
      if (Notification.permission === 'default') {
        Notification.requestPermission();
      }
    }, { once: true });

    // ユーザーリスト表示
    db.ref('users').on('value', snap => {
      const listEl = document.getElementById('user-list');
      listEl.innerHTML = "";
      const users = snap.val();
      for (let id in users) {
        if (users[id].email === user.email) continue;
        const div = document.createElement('div');
        div.className = 'user-item';
        div.innerHTML = `<span>${users[id].name}</span><button class="push-btn" onclick="sendPush('${id}')">PUSH</button>`;
        listEl.appendChild(div);
      }
    });

    // 自分宛の通知を監視
    db.ref('notifications/' + safeEmail).on('value', snap => {
      const data = snap.val();
      if (data && data.time > Date.now() - 10000) {
        new Notification("⚠️ 呼び出し", { body: data.from + "さんから通知です！" });
      }
    });
  }

  window.sendPush = (targetId) => {
    db.ref('notifications/' + targetId).set({
      from: auth.currentUser.displayName,
      time: Date.now()
    });
    alert("送信完了！");
  };
</script>

</body>
</html>
