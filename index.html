<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUTO-SAVE PUSH</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    :root { --accent: #00d1b2; --bg: #0d1117; --panel: #161b22; }
    body { font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
    .card { background: var(--panel); border: 1px solid #30363d; padding: 25px; border-radius: 15px; width: 100%; max-width: 350px; text-align: center; }
    input { width: 80%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; }
    button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: var(--accent); color: white; }
    .user-item { background: #21262d; padding: 12px; margin: 8px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--accent); }
    .push-btn { width: auto; padding: 6px 15px; background: #30363d; }
    .hidden { display: none; }
    #status { font-size: 0.8rem; color: #8b949e; margin-bottom: 15px; }
    .logout-link { font-size: 0.7rem; color: #f85149; text-decoration: underline; cursor: pointer; margin-top: 20px; display: inline-block; }
  </style>
</head>
<body>

<div class="card">
  <h2>TARGET PUSH</h2>
  <div id="status">読み込み中...</div>

  <div id="login-section" class="hidden">
    <input type="text" id="username" placeholder="名前を入力（保存されます）" maxlength="10">
    <button id="login-btn">入室＆保存</button>
  </div>

  <div id="main-section" class="hidden">
    <div id="user-list">待機中...</div>
    <span class="logout-link" onclick="logout()">名前を消してやり直す</span>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAfjTWeL71syzo7SNpym7ATcbrq6i7JfXQ",
    authDomain: "game-server-df061.firebaseapp.com",
    databaseURL: "https://game-server-df061-default-rtdb.firebaseio.com",
    projectId: "game-server-df061",
    storageBucket: "game-server-df061.firebasestorage.app",
    messagingSenderId: "475396427934",
    appId: "1:475396427934:web:5106a6210aa51e3b8f6b8f"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  let myName = "";

  // --- 【オートセーブ機能】ページ読み込み時に保存された名前をチェック ---
  window.onload = () => {
    const savedName = localStorage.getItem('saved_push_name');
    if (savedName) {
      login(savedName);
    } else {
      document.getElementById('login-section').classList.remove('hidden');
      document.getElementById('status').innerText = "ログインしてください";
    }
  };

  // 入室ボタンクリック
  document.getElementById('login-btn').onclick = () => {
    const input = document.getElementById('username').value.trim();
    if (!input) return alert("名前を入力してください");
    
    // ブラウザに保存（オートセーブ）
    localStorage.setItem('saved_push_name', input);
    login(input);
  };

  function login(name) {
    myName = name;
    document.getElementById('login-section').classList.add('hidden');
    document.getElementById('main-section').classList.remove('hidden');
    document.getElementById('status').innerText = "ログイン中: " + myName;
    startApp();
  }

  // 名前を消去（ログアウト）
  window.logout = () => {
    localStorage.removeItem('saved_push_name');
    location.reload();
  };

  function startApp() {
    // 通知許可の催促
    if ("Notification" in window) Notification.requestPermission();

    // 名簿登録
    db.ref('active_users/' + myName).set({ last_seen: Date.now() });

    // 名簿表示
    db.ref('active_users').on('value', snap => {
      const listEl = document.getElementById('user-list');
      listEl.innerHTML = "";
      const users = snap.val();
      for (let name in users) {
        if (name === myName) continue;
        const div = document.createElement('div');
        div.className = 'user-item';
        div.innerHTML = `<span>${name}</span><button class="push-btn" onclick="sendPush('${name}')">PUSH</button>`;
        listEl.appendChild(div);
      }
      if (!listEl.innerHTML) listEl.innerHTML = "他の待機者はいません";
    });

    // 通知受信
    db.ref('alerts/' + myName).on('value', snap => {
      const data = snap.val();
      if (data && data.time > Date.now() - 5000) {
        new Notification("🚨 呼び出し", { body: data.from + "さんが呼んでいます！" });
      }
    });
  }

  window.sendPush = (targetName) => {
    db.ref('alerts/' + targetName).set({ from: myName, time: Date.now() });
    alert(targetName + "に送信しました");
  };
</script>

</body>
</html>
